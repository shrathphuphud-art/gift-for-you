<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เป็นแฟนกันมั้ยครับ?</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a2;
            --bg-color: #faecee;
            --text-color: #d63384;
        }

        body {
            background-color: var(--bg-color);
            background-image: url("https://www.transparenttextures.com/patterns/wall-4-light.png");
            font-family: 'Itim', cursive;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, p, .photo-group {
            opacity: 0; 
            animation: fadeInUp 1s ease-out forwards;
        }

        h1 { color: var(--text-color); font-size: 3.5rem; margin-bottom: 10px; animation-delay: 0.5s; z-index: 10; }
        p { color: #590d22; font-size: 1.5rem; animation-delay: 1.5s; z-index: 10; margin-bottom: 20px;}
        .birthday-text { color: var(--primary); font-size: 2.5rem; animation-delay: 2.5s; z-index: 10; }
        .photo-group { animation-delay: 3.5s; z-index: 10; }
        
        .photo-group {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .side-img {
            width: 180px;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid white;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .side-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .party-hat {
            display: inline-block;
            animation: wobbleHat 1s infinite alternate ease-in-out;
            transform-origin: bottom center;
        }
        @keyframes wobbleHat {
            0% { transform: rotate(-20deg) scale(1); }
            100% { transform: rotate(20deg) scale(1.15); }
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            z-index: 20;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 4s;
            opacity: 0;
        }

        button {
            padding: 15px 40px;
            font-size: 1.8rem;
            font-family: 'Itim', cursive;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }

        #be {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.7);
            animation: glowing 1.5s infinite alternate;
        }
        #be:hover {
            transform: scale(1.1);
        }
        @keyframes glowing {
            from { box-shadow: 0 0 5px rgba(255, 77, 109, 0.5); }
            to { box-shadow: 0 0 20px rgba(255, 77, 109, 1), 0 0 30px rgba(255, 77, 109, 0.7); }
        }

        #nah {
            background-color: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .heart-particle {
            position: fixed; 
            bottom: -10vh;
            color: rgba(255, 182, 193, 0.6);
            z-index: 1;
            animation: raise infinite linear;
        }
        @keyframes raise {
            0% { bottom: -10vh; opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; }
            100% { bottom: 110vh; opacity: 0; transform: scale(1); }
        }
        .heart-particle:nth-child(1) { left: 10%; animation-duration: 7s; font-size: 20px; }
        .heart-particle:nth-child(2) { left: 25%; animation-duration: 6s; animation-delay: 1s; font-size: 25px; }
        .heart-particle:nth-child(3) { left: 40%; animation-duration: 8s; animation-delay: 2s; font-size: 18px; }
        .heart-particle:nth-child(4) { left: 55%; animation-duration: 6.5s; animation-delay: 0.5s; font-size: 15px; }
        .heart-particle:nth-child(5) { left: 70%; animation-duration: 7.5s; animation-delay: 3s; font-size: 28px; }
        .heart-particle:nth-child(6) { left: 85%; animation-duration: 6s; animation-delay: 1.5s; font-size: 22px; }

        .cursor-heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            animation: fadeOut 1s forwards;
            z-index: 9999;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
    </style>
</head>
<body>

    <div class="heart-particle">❤</div>
    <div class="heart-particle">💖</div>
    <div class="heart-particle">❤</div>
    <div class="heart-particle">💗</div>
    <div class="heart-particle">❤</div>
    <div class="heart-particle">♥</div>

    <div id="content-box">
        <h1>เป็นแฟนกันนะครับ</h1>
        <p>อยู่คุยกันมาขนาดนี้แล้ว... ลองคบกันดูมั้ย?<br>รักนะครั๊บ</p>
        
        <h2 class="birthday-text">Happy Birthday to US <span class="party-hat">🥳</span></h2>
        <p>เกิดวันเดียวกันแล้ว... เป็นแฟนกันด้วยเลยได้มั้ยครับ?</p>

        <div class="photo-group">
            <img src="pic1.jpg" class="side-img" alt="pic1">
            <img src="pic2.jpg" class="side-img" alt="pic2">
            <img src="pic3.jpg" class="side-img" alt="pic3">
        </div>

        <div class="btn-container">
            <button id="be">be</button>
            <button id="nah">nah</button>
        </div>
    </div>

    <script>
        document.addEventListener('mousemove', function(e) {
            if(Math.random() > 0.8) return; 
            const heart = document.createElement('div');
            const heartColors = ['❤', '💖', '💗', '💓', '✨'];
            heart.innerHTML = heartColors[Math.floor(Math.random() * heartColors.length)];
            heart.className = 'cursor-heart';
            heart.style.left = (e.pageX - 10) + 'px';
            heart.style.top = (e.pageY - 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        });

        const nahBtn = document.getElementById('nah');
        nahBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - nahBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - nahBtn.offsetHeight);
            nahBtn.style.position = 'fixed';
            nahBtn.style.left = `${x}px`;
            nahBtn.style.top = `${y}px`;
            nahBtn.style.transform = 'none';
        });

        const signBtn = document.getElementById('be');
        const contentBox = document.getElementById('content-box');
        
        signBtn.addEventListener('click', () => {
            confetti({ particleCount: 150, spread: 360, origin: { y: 0.5 } });
            contentBox.innerHTML = `
                <h1 style="color: #ff4d6d; font-size: 4rem;">เย้! สัญญาเสร็จสมบูรณ์! 🎉</h1>
                <p style="font-size: 2rem;">รักคุณมากที่สุดเลยยยย 💖</p>
            `;
        });
    </script>
</body>
</html>
